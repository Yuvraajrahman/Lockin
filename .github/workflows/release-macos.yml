name: macOS release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .zip and .dmg
        run: bash ./scripts/build-macos-release.sh

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/iLockin-*-macos-universal.zip
            dist/iLockin-*-macos-universal.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
